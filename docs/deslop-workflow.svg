<svg xmlns="http://www.w3.org/2000/svg" width="920" height="720" viewBox="0 0 920 720" role="img" aria-labelledby="title desc">
  <title id="title">Deslop workflow</title>
  <desc id="desc">A flow diagram showing the Deslop process from creating a flow folder through implementation verification.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#56616f" />
    </marker>
    <style>
      .canvas { fill: #ffffff; }
      .box { fill: #f8fafc; stroke: #64748b; stroke-width: 1.5; rx: 8; }
      .decision { fill: #fff7ed; stroke: #c2410c; stroke-width: 1.5; }
      .text { fill: #0f172a; font-family: Arial, Helvetica, sans-serif; font-size: 15px; text-anchor: middle; dominant-baseline: middle; }
      .small { fill: #475569; font-family: Arial, Helvetica, sans-serif; font-size: 13px; text-anchor: middle; dominant-baseline: middle; }
      .line { fill: none; stroke: #56616f; stroke-width: 1.8; marker-end: url(#arrow); }
      .label { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1; rx: 5; }
    </style>
  </defs>

  <rect class="canvas" width="920" height="720" />

  <rect class="box" x="320" y="24" width="280" height="48" />
  <text class="text" x="460" y="48">Create flow folder</text>

  <rect class="box" x="320" y="96" width="280" height="48" />
  <text class="text" x="460" y="120">Add context to background/</text>

  <rect class="box" x="320" y="168" width="280" height="48" />
  <text class="text" x="460" y="192">deslop-understand</text>

  <rect class="box" x="320" y="240" width="280" height="48" />
  <text class="text" x="460" y="264">Review docs/documentation.md</text>

  <rect class="box" x="300" y="312" width="320" height="48" />
  <text class="text" x="460" y="336">deslop-generate-acceptance-criteria</text>

  <rect class="box" x="300" y="384" width="320" height="48" />
  <text class="text" x="460" y="408">Review docs/acceptance-criteria.md</text>

  <path class="decision" d="M 460 456 L 630 516 L 460 576 L 290 516 Z" />
  <text class="text" x="460" y="507">Need multiple</text>
  <text class="text" x="460" y="526">solution ideas?</text>

  <rect class="box" x="32" y="492" width="236" height="48" />
  <text class="text" x="150" y="516">deslop-brainstorm-proposals</text>

  <rect class="box" x="650" y="492" width="220" height="48" />
  <text class="text" x="760" y="516">deslop-propose</text>

  <rect class="box" x="650" y="576" width="220" height="48" />
  <text class="text" x="760" y="600">deslop-plan-prs</text>

  <rect class="box" x="650" y="648" width="220" height="48" />
  <text class="text" x="760" y="672">Implement</text>

  <rect class="box" x="300" y="648" width="320" height="48" />
  <text class="text" x="460" y="672">deslop-verify-implementation</text>

  <path class="line" d="M 460 72 L 460 96" />
  <path class="line" d="M 460 144 L 460 168" />
  <path class="line" d="M 460 216 L 460 240" />
  <path class="line" d="M 460 288 L 460 312" />
  <path class="line" d="M 460 360 L 460 384" />
  <path class="line" d="M 460 432 L 460 456" />

  <path class="line" d="M 290 516 L 268 516" />
  <rect class="label" x="272" y="498" width="42" height="24" />
  <text class="small" x="293" y="510">Yes</text>
  <path class="line" d="M 630 516 L 650 516" />
  <rect class="label" x="600" y="498" width="36" height="24" />
  <text class="small" x="618" y="510">No</text>

  <path class="line" d="M 268 516 L 650 516" />
  <path class="line" d="M 760 540 L 760 576" />
  <path class="line" d="M 760 624 L 760 648" />
  <path class="line" d="M 650 672 L 620 672" />
</svg>
